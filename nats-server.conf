# SKYLENS NATS Server Configuration
# Run with: nats-server -c nats-server.conf

# Server identification
server_name: skylens-node

# Client connections
port: 4222
host: 0.0.0.0

# HTTP monitoring
http_port: 8222

# Logging
debug: false
trace: false
logtime: true
log_file: "/var/log/skylens/nats.log"

# Connection limits
max_connections: 100
max_payload: 1048576  # 1MB max message size

# Timeouts
ping_interval: 30s
ping_max: 3

# Write deadline for slow consumers
write_deadline: 10s

# JetStream (optional, for message persistence)
# jetstream {
#     store_dir: "/var/lib/skylens/nats"
#     max_memory_store: 256MB
#     max_file_store: 1GB
# }
