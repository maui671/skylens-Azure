[tap]
id = "tap-003"
name = "Tap 3 (Nzyme Pi)"
latitude = 18.252459
longitude = -65.640278

[capture]
interface = "wlx00c0cab8f59c"
passive = false
tshark = true
channel_width_hopping = true
# Optimized DJI detection: 8 channels, ~2.2s cycle
# ch6 = 5x dwell (RemoteID beacon + NAN + DroneID)
# ch149@80 = 3x dwell (NAN 5GHz + OcuSync/O3 + DroneID 5.8GHz)
# ch1,11 = DroneID 2.4GHz edge hops
# ch165 = O3 upper channel
channels = [1, 6, 11, 149, 153, 157, 161, 165]
hop_interval_ms = 200

[nats]
url = "nats://127.0.0.1:14222"
reconnect_interval_ms = 1000

[nats.buffer]
max_size = 10000
max_retries = 100
initial_retry_delay_ms = 1000
max_retry_delay_ms = 30000
warning_threshold = 0.8

[logging]
level = "info"
