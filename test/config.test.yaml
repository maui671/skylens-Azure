# Skylens Node Test Configuration
# Used for integration and end-to-end testing

nats:
  url: "nats://localhost:4222"

http:
  port: 8080
  websocket_port: 8081
  api_key: ""  # No auth for testing

database:
  # Use in-memory or ephemeral DB for tests
  host: "localhost"
  port: 5432
  user: "skylens"
  password: "test"
  database: "skylens_test"
  max_connections: 10

redis:
  host: "localhost"
  port: 6379
  database: 1  # Use DB 1 for tests (not production DB 0)

detection:
  lost_threshold_sec: 60
  trust_decay_rate: 0.01
  max_history_hours: 24
  max_displayed_drones: 1000
  spoof_check_enabled: true
  single_tap_mode: false  # Require multi-TAP correlation in tests

correlation:
  window_sec: 30
  min_taps: 2
  confidence_boost: 0.30

logging:
  level: "debug"
  format: "json"
